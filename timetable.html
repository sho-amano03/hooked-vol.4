<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TIME TABLE-HOOKED vol.4</title>
    <!-- font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Coiny&family=DynaPuff:wght@400..700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <a href="index.html" class="back-to-top">TOP</a>
    <h1>TIME TABLE</h1>

    <section class="Timetable">

        <div class="tt-item">
            <div class="tt-time">16:00</div>
            <div class="tt-content">
                <div class="tt-title">OPEN</div>
            </div>
        </div>

        <div class="tt-item">
            <div class="tt-time">16:40</div>
            <div class="tt-content">
                <div class="tt-title">1ブロック</div>
                <ul>
                    <li>Team name</li>
                    <li>Team name</li>
                    <li>Team name</li>
                </ul>
            </div>
        </div>

        <div class="tt-item">
            <div class="tt-time">
                <div>17:30</div>
                <div class="time-bar"></div>
                <div>17:50</div>
            </div>
            <div class="tt-content">
                <div class="tt-title">cipherタイム</div>
            </div>
        </div>

        <div class="tt-item">
            <div class="tt-time">18:00</div>
            <div class="tt-content">
                <div class="tt-title">2ブロック</div>
                <ul>
                    <li>Team name</li>
                    <li>Team name</li>
                    <li>Team name</li>
                </ul>
            </div>
        </div>

        <div class="tt-item">
            <div class="tt-time">19:00</div>
            <div class="tt-content">
                <div class="tt-title">CLOSE</div>
            </div>
        </div>

        
    </section>

</body>
</html>
